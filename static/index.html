<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Alf-E">
    <meta name="theme-color" content="#0066CC">
    <title>Alf-E</title>
    <link rel="manifest" href="static/manifest.json">
    <link rel="apple-touch-icon" href="static/icon.svg">
    <link rel="stylesheet" href="static/app.css">
</head>
<body>
    <div id="app">

        <!-- Sidebar overlay (mobile) -->
        <div id="sidebar-overlay" class="sidebar-overlay"></div>

        <!-- Sidebar -->
        <nav id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <span class="logo">ALF-E</span>
                <button id="new-chat-btn" class="btn-icon" title="New chat">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                    </svg>
                </button>
            </div>
            <div id="conversation-list" class="conversation-list"></div>
            <div class="sidebar-footer">
                <label class="user-label">Logged in as</label>
                <select id="user-selector" class="user-select">
                    <option value="fraser">Fraser (Owner)</option>
                    <option value="family">Family</option>
                    <option value="guest">Guest</option>
                </select>
            </div>
        </nav>

        <!-- Main -->
        <main id="main">

            <!-- Header -->
            <header id="header">
                <button id="menu-btn" class="btn-icon" title="Menu">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
                    </svg>
                </button>
                <div class="header-title">
                    <span>Alf-E</span>
                    <span id="status-dot" class="status-dot" title="Checking..."></span>
                </div>
                <button id="sensors-btn" class="btn-icon" title="Toggle sensors">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
                    </svg>
                </button>
                <button id="insights-btn" class="btn-icon" title="Alf-E Insights">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/>
                        <line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/>
                    </svg>
                    <span id="insights-badge" class="insights-badge hidden">0</span>
                </button>
                <button id="audit-btn" class="btn-icon" title="Audit log — what Alf-E did">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                        <polyline points="14 2 14 8 20 8"/>
                        <line x1="8" y1="13" x2="16" y2="13"/>
                        <line x1="8" y1="17" x2="16" y2="17"/>
                    </svg>
                </button>
            </header>

            <!-- Audit drawer -->
            <div id="audit-drawer" class="insights-drawer hidden">
                <div class="insights-header">
                    <span>Audit Log — what Alf-E did</span>
                    <button class="btn-icon" onclick="toggleAuditDrawer()" title="Close">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                        </svg>
                    </button>
                </div>
                <div id="audit-list" class="insights-list">
                    <div class="insights-empty">Loading…</div>
                </div>
            </div>

            <!-- Insights drawer -->
            <div id="insights-drawer" class="insights-drawer hidden">
                <div class="insights-header">
                    <span>Alf-E Insights</span>
                    <button class="btn-icon" onclick="toggleInsightsDrawer()" title="Close">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                        </svg>
                    </button>
                </div>
                <div id="insights-list" class="insights-list">
                    <div class="insights-empty">No insights yet — check back in 15 minutes.</div>
                </div>
            </div>

            <!-- Sensor bar -->
            <div id="sensor-bar" class="sensor-bar hidden">
                <div id="sensor-grid" class="sensor-grid"></div>
            </div>

            <!-- Messages -->
            <div id="messages" class="messages"></div>

            <!-- Input -->
            <div class="input-area">
                <form id="chat-form">
                    <textarea
                        id="message-input"
                        placeholder="Message Alf-E..."
                        rows="1"
                        autocomplete="off"
                        autocorrect="off"
                        spellcheck="true"
                    ></textarea>
                    <button type="submit" id="send-btn" class="send-btn" disabled title="Send">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>
                        </svg>
                    </button>
                </form>
            </div>

        </main>
    </div>

    <script src="static/app.js"></script>
</body>
</html>
