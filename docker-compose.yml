# Alf-E — Full stack for N95 mini PC (Intel N100, 12GB RAM, 500GB SSD)
# Ubuntu Server 24.04 LTS, no GUI
#
# Services:
#   alf-e         — Main AI agent (this repo) on port 8099
#   homeassistant — HA Core on port 8123
#   ollama        — Local LLM inference on port 11434
#   tailscale     — Mesh VPN + Funnel for family access without VPN app
#   portainer     — Docker management UI on port 9000
#   dozzle        — Live container log viewer on port 8888
#   uptime-kuma   — Service health monitoring on port 3001
#   watchtower    — Automatic container image updates (nightly)
#
# First-time setup:
#   1. cp .env.example .env   ← fill in your API keys
#   2. docker compose up -d
#   3. Alf-E:          http://n95:8099
#      Home Assistant:  http://n95:8123
#
# Tailscale Funnel (public HTTPS — family access, no Tailscale app needed):
#   docker exec tailscale tailscale funnel --bg 8099
#   → https://<machine-name>.tail-xxxxx.ts.net

networks:
  alfe_net:
    driver: bridge

volumes:
  ha_config:
  alfe_data:
  ollama_models:
  tailscale_state:
  filebrowser_db:
  portainer_data:
  uptime_kuma_data:
  vaultwarden_data:
  mosquitto_data:
  mosquitto_log:
  esphome_config:
  node_red_data:
  caddy_data:
  caddy_config:

services:

  # ── Alf-E ──────────────────────────────────────────────────────────────────
  alf-e:
    build:
      context: .
      dockerfile: Dockerfile.standalone
    container_name: alf-e
    restart: unless-stopped
    ports:
      - "8099:8099"
    volumes:
      - alfe_data:/data                             # SQLite memory + connector tokens
      - ./playbooks:/app/playbooks:ro               # Hot-reload playbooks without rebuild
      - ./engine/connectors:/app/engine/connectors  # Self-built connectors written at runtime
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ALFE_API_TOKEN=${ALFE_API_TOKEN:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - HA_API_TOKEN=${HA_API_TOKEN:-}
      - HA_URL=http://homeassistant:8123
      - B2_BUCKET=${B2_BUCKET:-}
      - B2_PREFIX=${B2_PREFIX:-alfe-backups}
      - RCLONE_REMOTE=${RCLONE_REMOTE:-b2}
      - ALFE_PLAYBOOK=${ALFE_PLAYBOOK:-playbooks/fraser_nomad.toml}
      - ALFE_DATA_DIR=/data
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      homeassistant:
        condition: service_started
    networks:
      - alfe_net
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -sf -H \"Authorization: Bearer $ALFE_API_TOKEN\" http://localhost:8099/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Home Assistant Core ────────────────────────────────────────────────────
  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    container_name: homeassistant
    restart: unless-stopped
    privileged: true
    ports:
      - "8123:8123"
    volumes:
      - ha_config:/config
      - /etc/localtime:/etc/localtime:ro
    environment:
      - TZ=Australia/Brisbane
    networks:
      - alfe_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8123"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Ollama (local LLM — optional fast/cheap routing) ──────────────────────
  # model_router can route "fast" tier here instead of cloud APIs
  # First-run: docker exec ollama ollama pull llama3.2:3b
  # Recommended for N100 (no GPU): llama3.2:3b, phi3.5:mini
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_NUM_PARALLEL=2
    networks:
      - alfe_net

  # ── File Browser (web UI for editing HA config files) ────────────────────
  # Access at http://192.168.0.17:8080
  # Default login: admin / admin  ← change immediately after first login
  filebrowser:
    image: filebrowser/filebrowser:latest
    container_name: filebrowser
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ha_config:/srv                      # HA config folder exposed as root
      - filebrowser_db:/database            # persists settings + users
    networks:
      - alfe_net

  # ── Caddy (reverse proxy + internal TLS) ─────────────────────────────────
  # HTTPS ports (internal CA — trust caddy-ca.crt once in OS keychain):
  #   Vaultwarden  https://192.168.0.17:8444
  #   Alf-E        https://192.168.0.17:8098
  #   Home Asst    https://192.168.0.17:8124
  #   Portainer    https://192.168.0.17:9001
  #   Node-RED     https://192.168.0.17:1881
  #   ESPHome      https://192.168.0.17:6053
  #   Uptime Kuma  https://192.168.0.17:3002
  # After first start, export CA cert:
  #   docker cp caddy:/data/caddy/pki/authorities/local/root.crt ./caddy-ca.crt
  caddy:
    image: caddy:latest
    container_name: caddy
    restart: unless-stopped
    ports:
      - "8098:8098"
      - "8124:8124"
      - "8444:8444"
      - "9001:9001"
      - "1881:1881"
      - "6053:6053"
      - "3002:3002"
    volumes:
      - ./config/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - alfe_net

  # ── Portainer (Docker management UI) ─────────────────────────────────────
  # Access at http://192.168.0.17:9000
  # First run: create admin user within 5 min or restart container
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: unless-stopped
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - alfe_net

  # ── Dozzle (live container log viewer) ────────────────────────────────────
  # Access at http://192.168.0.17:8888
  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    restart: unless-stopped
    ports:
      - "8888:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - alfe_net

  # ── Uptime Kuma (service health monitoring) ───────────────────────────────
  # Access at http://192.168.0.17:3001
  # Add monitors for: Alf-E, HA local, HA Nabu Casa, Ollama, FileBrowser
  uptime-kuma:
    image: louislam/uptime-kuma:latest
    container_name: uptime-kuma
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - uptime_kuma_data:/app/data
    networks:
      - alfe_net

  # ── Watchtower (automatic image updates) ──────────────────────────────────
  # Checks for new images nightly at 3am; updates non-critical containers
  # alf-e is excluded — updates should be intentional git pull + rebuild
  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_SCHEDULE=0 0 3 * * *
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_INCLUDE_STOPPED=false
      - WATCHTOWER_IGNORE_IMAGES=alf-e
    networks:
      - alfe_net

  # ── Vaultwarden (self-hosted password / token vault) ──────────────────────
  # Access at http://192.168.0.17:8181
  # Set VAULTWARDEN_ADMIN_TOKEN in .env to enable /admin panel
  # Use this to store all client HA tokens — one vault, all sites
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: unless-stopped
    ports:
      - "8181:80"
    volumes:
      - vaultwarden_data:/data
    environment:
      - ADMIN_TOKEN=${VAULTWARDEN_ADMIN_TOKEN:-}
      - SIGNUPS_ALLOWED=false
      - INVITATIONS_ALLOWED=true
      - DOMAIN=http://192.168.0.17:8181
    networks:
      - alfe_net

  # ── Mosquitto MQTT Broker ─────────────────────────────────────────────────
  # Port 1883: standard MQTT  |  Port 9001: WebSocket (HA frontend)
  # Add to HA: Settings → Integrations → MQTT → 192.168.0.17:1883
  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./config/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    networks:
      - alfe_net

  # ── ESPHome (flash + manage ESP32/ESP8266 sensors) ───────────────────────
  # Access at http://192.168.0.17:6052
  # Use to build custom sensors for client installs
  esphome:
    image: ghcr.io/esphome/esphome:latest
    container_name: esphome
    restart: unless-stopped
    ports:
      - "6052:6052"
    volumes:
      - esphome_config:/config
      - /etc/localtime:/etc/localtime:ro
    environment:
      - TZ=Australia/Brisbane
    networks:
      - alfe_net

  # ── Node-RED (visual automation flows) ───────────────────────────────────
  # Access at http://192.168.0.17:1880
  # Connects to Mosquitto MQTT + HA + Alf-E webhooks
  node-red:
    image: nodered/node-red:latest
    container_name: node-red
    restart: unless-stopped
    ports:
      - "1880:1880"
    volumes:
      - node_red_data:/data
    environment:
      - TZ=Australia/Brisbane
    depends_on:
      - mosquitto
    networks:
      - alfe_net

  # ── Zigbee2MQTT (activate when Zigbee stick is plugged in) ───────────────
  # Uncomment when back at home base with the Zigbee USB stick
  # Access at http://192.168.0.17:8889
  # zigbee2mqtt:
  #   image: koenkk/zigbee2mqtt:latest
  #   container_name: zigbee2mqtt
  #   restart: unless-stopped
  #   ports:
  #     - "8889:8080"
  #   volumes:
  #     - zigbee2mqtt_data:/app/data
  #     - /run/udev:/run/udev:ro
  #   devices:
  #     - /dev/ttyUSB0:/dev/ttyUSB0   # adjust to your stick's path
  #   environment:
  #     - TZ=Australia/Brisbane
  #   depends_on:
  #     - mosquitto
  #   networks:
  #     - alfe_net

  # ── Tailscale ─────────────────────────────────────────────────────────────
  # After first run:
  #   docker exec tailscale tailscale up --authkey=<tskey-...>
  #   docker exec tailscale tailscale funnel --bg 8099
  tailscale:
    image: tailscale/tailscale:latest
    container_name: tailscale
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - tailscale_state:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    environment:
      - TS_AUTHKEY=${TAILSCALE_AUTHKEY:-}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
    network_mode: host
