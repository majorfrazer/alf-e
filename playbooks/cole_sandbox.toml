[metadata]
name = "Cole Family Sandbox"
description = "Fraser's household Alf-E instance — the proving ground"
version = "2.3.1"
owner = "Fraser Cole"
timezone = "Australia/Brisbane"

personality_prompt = """
You are Alf-C: Fraser Cole's household AI butler, running on a mini PC in Ormeau, Brisbane.

PERSONALITY:
- Cheeky, Australian (hints of NZ and Canadian)
- Dry humour and dad jokes mandatory
- Honest about limitations — black and white options, not sugarcoating
- Builds things alongside Fraser, not just for him
- You're talking to a mate, not a customer

CONTEXT:
- House has solar panels (ShellyProEM50), Tesla Model 3, smart plugs (TP-Link P110)
- Brisbane tariff: peak $0.3557/kWh (06:00-00:00), off-peak $0.08/kWh (00:00-06:00), feed-in $0.03/kWh
- When reasoning about energy, always consider time-of-use and solar availability
"""

# ── AI Providers ─────────────────────────────────────────────────────────

# ── Gemini Pro priority until Saturday credit reset ──────────────────────────
# Fraser has Gemini credits — routing default/fast/heavy to Pro to save Claude credits.
# Haiku kept as 'claude_fallback' for when Google fails.
# Swap back after Saturday: rename claude_fallback → default, comment out google tiers.

[llm.default]
provider = "google"
model = "gemini-2.0-flash"
api_key_env = "GOOGLE_API_KEY"
max_tokens = 4096
temperature = 0.7
cost_per_1k_input = 0.00125
cost_per_1k_output = 0.01
capabilities = ["general", "reasoning", "analysis"]

[llm.fast]
provider = "google"
model = "gemini-2.0-flash"
api_key_env = "GOOGLE_API_KEY"
max_tokens = 1500
temperature = 0.7
cost_per_1k_input = 0.00125
cost_per_1k_output = 0.01
capabilities = ["quick", "status"]

[llm.heavy]
provider = "google"
model = "gemini-2.0-flash"
api_key_env = "GOOGLE_API_KEY"
max_tokens = 8192
temperature = 0.5
cost_per_1k_input = 0.00125
cost_per_1k_output = 0.01
capabilities = ["reasoning", "analysis", "code"]

# Anthropic fallback — used automatically if Google fails
[llm.claude_fallback]
provider = "anthropic"
model = "claude-haiku-4-5-20251001"
api_key_env = "ANTHROPIC_API_KEY"
max_tokens = 2000
temperature = 0.7
cost_per_1k_input = 0.0008
cost_per_1k_output = 0.004
capabilities = ["general", "fallback"]

[llm.offline]
provider = "ollama"
model = "llama3.2"
api_key_env = "OLLAMA_UNUSED"
max_tokens = 2000
temperature = 0.7
cost_per_1k_input = 0.0
cost_per_1k_output = 0.0
capabilities = ["general", "offline"]

# ── Home Assistant ───────────────────────────────────────────────────────

[home_assistant]
# HA add-on mode: server.py auto-uses http://supervisor/core + SUPERVISOR_TOKEN
# N95 Docker mode: set HA_URL=http://homeassistant:8123 in your .env
# Remote (Nabu Casa): use the URL below
url = "https://xscydqtpjre3sxxwnt6irbmy6tnmnjeo.ui.nabu.casa"
token_env = "HA_API_TOKEN"

# ── Sensors ──────────────────────────────────────────────────────────────

[sensors]
# ShellyPro EM50 (08f9e0e7fcac) — at inverter/AC panel
solar_watts         = "sensor.shellyproem50_08f9e0e7fcac_energy_meter_1_power"   # Ch1 = Solar inverter output
ac_watts            = "sensor.shellyproem50_08f9e0e7fcac_energy_meter_0_power"   # Ch0 = Air conditioner
# ShellyEM 2-ch (ec64c9c8d5bf) — at main switchboard
grid_watts          = "sensor.shellyem_ec64c9c8d5bf_channel_1_power"             # Ch0 (HA ch1) = Grid; negative = exporting
house_lights_watts  = "sensor.shellyem_ec64c9c8d5bf_channel_2_power"             # Ch1 (HA ch2) = House lights circuit
# Tesla
tesla_soc           = "sensor.model_3_battery_level"
tesla_charging      = "sensor.model_3_charging"
tesla_charger_power = "sensor.shelly1pmg3_dcda0ce167c4_power"                    # Shelly 1PM G3 = Tesla charger

# ── Users ────────────────────────────────────────────────────────────────

[[users]]
id = "fraser"
name = "Fraser"
role = "owner"

[[users]]
id = "family"
name = "Family"
role = "member"
permitted_domains = ["energy", "weather", "entertainment", "scheduling"]

[[users]]
id = "guest"
name = "Guest"
role = "guest"

# ── Notifications ────────────────────────────────────────────────────────

[[notifications]]
channel = "pwa_push"
enabled = true
urgency_min = "normal"

# ── Energy ───────────────────────────────────────────────────────────────
# Structured tariff data — the agent uses these for charge optimisation
# and cost calculations instead of parsing the personality prompt.

[energy]
peak_rate = 0.3557
offpeak_rate = 0.08
feed_in_rate = 0.03
peak_start = "06:00"
peak_end = "00:00"
solar_capacity_kw = 6.6
battery_capacity_kwh = 0.0
battery_min_soc = 20
currency = "AUD"

# ── Security ─────────────────────────────────────────────────────────────

[security]
require_approval_for_writes = true
max_actions_per_minute = 30
max_actions_per_hour = 300
audit_log_retention_days = 90
safe_file_roots = ["/data/alfe_notes", "/data/reports"]

# ── Boundaries (safety rails the agent must never violate) ───────────────

[[boundaries]]
id = "tesla_min_charge"
description = "Never discharge Tesla below 20% — always keep enough for an emergency trip"
type = "custom"
limit = 20.0
unit = "percent"
escalation_message = "Tesla SOC at {value}% — refusing to discharge further."

[[boundaries]]
id = "max_daily_spend"
description = "Max daily API spend before Alf-E self-limits to fast tier only"
type = "monetary"
limit = 2.00
unit = "USD"
escalation_message = "Daily API spend hit ${value} — switching to fast tier only."

[[boundaries]]
id = "no_fridge_off"
description = "Never turn off the fridge or freezer — food safety"
type = "custom"
limit = 0.0
unit = "boolean"
escalation_message = "Blocked: cannot turn off fridge/freezer."

# ── Actions ──────────────────────────────────────────────────────────────

# Read-only sensor checks — always autonomous
[actions.solar_check]
description = "Check current solar generation"
verb = "ha_query"
entity = "sensor.shellyproem50_08f9e0e7fcac_energy_meter_1_power"
approval = "autonomous"

[actions.tesla_check]
description = "Check Tesla battery level"
verb = "ha_query"
entity = "sensor.model_3_battery_level"
approval = "autonomous"

[actions.ac_power]
description = "Check air conditioner power consumption"
verb = "ha_query"
entity = "sensor.shellyproem50_08f9e0e7fcac_energy_meter_0_power"
approval = "autonomous"

# Smart plugs — toggling is safe, just notify
[actions.smart_plug_toggle]
description = "Toggle any smart plug on/off"
verb = "ha_call"
entity_pattern = "switch"
approval = "notify"

# Lights — safe to toggle autonomously
[actions.light_control]
description = "Control any light"
verb = "ha_call"
entity_pattern = "light"
approval = "autonomous"

# Climate — needs confirmation (affects comfort + energy cost)
[actions.climate_control]
description = "Change thermostat or climate settings"
verb = "ha_call"
entity_pattern = "climate"
approval = "confirm"

# Automations — writing/deleting is admin-only
[actions.automation_write]
description = "Create or modify a Home Assistant automation"
verb = "ha_call"
entity_pattern = "automation"
command = "ha_write_automation"
approval = "admin_only"

[actions.automation_delete]
description = "Delete a Home Assistant automation"
verb = "ha_call"
entity_pattern = "automation"
command = "ha_delete_automation"
approval = "admin_only"

# ── Connectors (loaded by ConnectorRegistry at startup) ──────────────────
# The registry reads this section to know which connectors to load.
# connector_id must match a module in engine/connectors/<id>.py

[[connectors]]
id = "ha"
enabled = true
# url and token_env are inherited from [home_assistant] for backwards compat

[[connectors]]
id = "gmail"
enabled = true
user = "alfe.cole@gmail.com"
# credentials_path and token_path default to /data/gmail_credentials.json and /data/gmail_token.json
# Run scripts/gmail_auth.py on your Mac to generate the token file.

# ── Scheduled Ops ────────────────────────────────────────────────────────

[[scheduled_ops]]
id = "morning_briefing"
name = "Morning Briefing"
description = "Daily summary: energy, weather, calendar, tasks"
at_time = "06:30"
notify_on_complete = true

prompt = """
Generate a morning briefing for the Cole family. Include:
1. Overnight energy summary (solar earned, grid used, Tesla charge status)
2. Today's weather forecast for Ormeau/Brisbane
3. Any calendar events today
4. Any anomalies or things that need attention
Keep it concise and friendly. This is a family household, not a boardroom.
"""
