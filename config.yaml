name: "Alf-E"
version: "2.5.0"
slug: "alfe"
description: "Your personal AI agent — home automation, energy, and more."
url: "https://github.com/majorfrazer/alf-e"
arch:
  - aarch64
  - amd64

# Pre-built image on GHCR — HA pulls this instead of building from source.
# {arch} is substituted by the supervisor (amd64 or aarch64).
image: "ghcr.io/majorfrazer/alf-e/{arch}"

startup: application
boot: auto
init: false
homeassistant_api: true

# Ingress: Alf-E appears in HA sidebar, proxied through Nabu Casa (HTTPS automatic)
ingress: true
ingress_port: 8000
ingress_stream: true     # Required for SSE streaming chat responses
panel_icon: mdi:robot
panel_title: Alf-E

# Persistent storage — SQLite DB survives restarts and updates
map:
  - data

# Add-on configuration (set in HA UI under the add-on's Configuration tab)
options:
  anthropic_api_key: ""
  google_api_key: ""
  owner_name: "Household Owner"
  household_name: "My Home"
  timezone: "Australia/Brisbane"
  playbook: ""

schema:
  anthropic_api_key: str
  google_api_key: str?
  owner_name: str
  household_name: str
  timezone: str
  playbook: str?
